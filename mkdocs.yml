site_name: Deep Research
site_description: A collection of deep dives on various topics
repo_url: https://github.com/skryl/deep-research

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

docs_dir: .

nav:
  - Home: index.md
  - 2026:
    - 2026/index.md
    - Claude Code:
      - 2026/260307-claude-code/index.md
      - Architecture: 2026/260307-claude-code/architecture.md
      - Features: 2026/260307-claude-code/features.md
      - Configuration: 2026/260307-claude-code/configuration.md
      - Workflows: 2026/260307-claude-code/workflows.md
      - SDK & Automation: 2026/260307-claude-code/sdk-and-automation.md
